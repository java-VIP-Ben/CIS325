<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>JSON Account Information</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>

    <div class="container">
      <h1>Manage Account Information</h1>

      <form id="submitForm" action="/submit-form" method="POST">
        <div class="form-row">
          <label for="fname">First Name:</label>
          <input type="text" id="fname" name="fname" required>
        </div>
        <small id="fnameError" style="color: red;"></small>


        <div class="form-row">
          <label for="lname">Last Name:</label>
          <input type="text" id="lname" name="lname" required>
        </div>
        <small id="lnameError" style="color: red;"></small>

        <div class="form-row">
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required>
        </div>
        <small id="emailError" style="color: red;"></small>

        <div class="form-row">
          <label for="password">Password:</label>
          <input type="password" id="password" name="password" required>
        </div>
        <small id="passwordError" style="color: red;"></small>

        <div class="form-row">
          <label for="password2">Confirm Password:</label>
          <input type="password" id="password2" name="password2" required>
        </div>
        <small id="password2Error" style="color: red;"></small>

        <div class="form-row">
          <label for="age">Age:</label>
          <input type="number" id="age" name="age" required min="18">
        </div>
        <small id="ageError" style="color: red;"></small>

        <div class="form-row">
          <label for"phone">Phone Number:</label>
          <input type="tel" id="phone" name="phone">
        </div>
        <small id="phoneError" style="color: red;"></small>

        <button id="submitBtn">Submit</button>
      </form>


      <script src="script.js"></script>
  </body>
</html>
